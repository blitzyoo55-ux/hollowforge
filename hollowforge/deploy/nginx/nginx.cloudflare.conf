worker_processes  1;
worker_rlimit_nofile 4096;

error_log  /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx_cloudflare_error.log warn;
pid        /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx_cloudflare.pid;

events {
    worker_connections  1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    access_log /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx_cloudflare_access.log;
    limit_req_zone $binary_remote_addr zone=hf_api_rate:10m rate=15r/s;
    limit_conn_zone $binary_remote_addr zone=hf_conn_limit:10m;

    upstream hollowforge_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 127.0.0.1:8080;
        server_name _;

        root /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/frontend/dist;
        index index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location /api/ {
            limit_req zone=hf_api_rate burst=60 nodelay;
            limit_conn hf_conn_limit 30;
            proxy_pass http://hollowforge_backend;
            proxy_connect_timeout 15s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /data/ {
            proxy_pass http://hollowforge_backend;
            proxy_connect_timeout 15s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
