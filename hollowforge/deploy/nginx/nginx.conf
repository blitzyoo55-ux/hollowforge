worker_processes  1;

error_log  /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx_error.log warn;
pid        /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 25m;

    access_log /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/backend/logs/nginx_access.log;

    upstream hollowforge_backend {
        server 127.0.0.1:8000;
    }

    upstream oauth2_proxy {
        server 127.0.0.1:4180;
    }

    server {
        listen 8080;
        server_name _;

        root /Users/mori_arty/AI_Projects/04_AI_Creative/nsfw-market-research/hollowforge/frontend/dist;
        index index.html;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /oauth2/auth {
            proxy_pass       http://oauth2_proxy/oauth2/auth;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Forwarded-Uri         $request_uri;
            proxy_set_header X-Scheme                $scheme;
            proxy_set_header Content-Length          "";
            proxy_pass_request_body                  off;
        }

        location /oauth2/ {
            proxy_pass       http://oauth2_proxy;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Forwarded-Proto       $scheme;
            proxy_set_header X-Forwarded-Host        $host;
            proxy_set_header X-Forwarded-Uri         $request_uri;
        }

        location @oauth2_signin {
            return 302 /oauth2/sign_in?rd=$scheme://$host$request_uri;
        }

        location /api/ {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_signin;

            proxy_pass http://hollowforge_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /data/ {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_signin;

            proxy_pass http://hollowforge_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_signin;

            try_files $uri $uri/ /index.html;
        }
    }
}
